<!DOCTYPE html>
<html>
<head>

<title>Ram & Yuktha Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0a1b3d;
color:white;
text-align:center;
overflow-x:hidden;
}

/* INTRO */

.intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a1b3d;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.envelope{
width:220px;
height:140px;
background:#FFD700;
position:relative;
cursor:pointer;
border-radius:8px;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#e6c200;
clip-path:polygon(0 0, 100% 0, 50% 50%);
transform-origin:top;
transition:1s;
}

.letter{
position:absolute;
top:20px;
left:10px;
width:200px;
height:100px;
background:white;
color:black;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
transition:1s;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1519741497674-611481863552") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
transform:scale(1.2);
opacity:0;
transition:1s;
}

.names{
font-family:'Cinzel',serif;
font-size:65px;
color:#FFD700;
}

.subtitle{
font-size:26px;
}

.date{
font-size:20px;
}

.ring{
font-size:70px;
margin-top:20px;
animation:spin 6s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* PREMIUM SCROLL INDICATOR */

.scroll-down{
position:absolute;
bottom:30px;
width:30px;
height:50px;
border:2px solid white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:flex-start;
cursor:pointer;
}

.scroll-down span{
width:6px;
height:6px;
background:white;
border-radius:50%;
margin-top:8px;
animation:scrollAnim 1.5s infinite;
}

@keyframes scrollAnim{
0%{opacity:0; transform:translateY(0);}
50%{opacity:1;}
100%{opacity:0; transform:translateY(20px);}
}

/* SECTION */

.section{
padding:80px 20px;
max-width:1000px;
margin:auto;
}

.countdown{
font-size:40px;
color:#FFD700;
}

/* INSTAGRAM GALLERY */

.insta-gallery{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
gap:20px;
padding:20px;
}

.insta-gallery::-webkit-scrollbar{
display:none;
}

.insta-gallery img{
min-width:80%;
height:400px;
object-fit:cover;
border-radius:20px;
scroll-snap-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* CARD */

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
max-width:400px;
margin:auto;
}

/* FLOWERS */

.flower{
position:fixed;
top:-10px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
100%{transform:translateY(110vh);}
}

/* SPARKLES */

.sparkle{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

/* WHATSAPP BUTTON */

.whatsapp-btn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
z-index:999;
text-decoration:none;
}

</style>
</head>

<body>

<!-- INTRO -->

<div class="intro" id="intro">
<div class="envelope" id="envelope">
<div class="flap" id="flap"></div>
<div class="letter">Open</div>
</div>
</div>

<!-- HERO -->

<div class="hero" id="hero">
<div class="names">Ram ❤️ Yuktha</div>
<div class="subtitle">We're Getting Engaged</div>
<div class="date">April 12, 2026 • 6:00 PM</div>
<div class="ring">💍</div>

<div class="scroll-down"><span></span></div>
</div>

<!-- COUNTDOWN -->

<div class="section">
<h2>Countdown</h2>
<div id="countdown" class="countdown"></div>
</div>

<!-- GALLERY -->

<div class="section">
<h2>Our Photos</h2>
<div class="insta-gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
</div>
</div>

<!-- EVENT -->

<div class="section">
<h2>Event</h2>
<div class="card">
<p>April 12, 2026 • 6PM</p>
<p>Hotel Sindhu Towers</p>

<a href="https://maps.app.goo.gl/Dyys4CopRbk1stgD9" target="_blank">
<iframe
src="https://maps.google.com/maps?q=hotel%20sindhu%20towers&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="300"
style="pointer-events:none;">
</iframe>
</a>

</div>
</div>

<!-- WHATSAPP -->

<a href="https://wa.me/916303850729?text=Hi%20I%20have%20a%20question%20regarding%20the%20engagement" 
target="_blank" class="whatsapp-btn">💬</a>

<script>

/* OPEN */

document.getElementById("envelope").onclick=function(){

document.getElementById("flap").style.transform="rotateX(180deg)";
document.querySelector(".letter").style.transform="translateY(-40px)";

setTimeout(()=>{
document.getElementById("intro").style.display="none";

let hero=document.getElementById("hero");
hero.style.transform="scale(1)";
hero.style.opacity="1";

startFlowers();
startSparkles();

},1000);
};

/* SCROLL */

document.querySelector(".scroll-down").onclick=function(){
window.scrollTo({top:window.innerHeight,behavior:"smooth"});
};

/* COUNTDOWN */

var countDownDate = new Date("Apr 12, 2026 18:00:00").getTime();

setInterval(function(){
var now = new Date().getTime();
var d = countDownDate - now;

document.getElementById("countdown").innerHTML =
Math.floor(d/86400000)+"D "+
Math.floor((d%86400000)/3600000)+"H "+
Math.floor((d%3600000)/60000)+"M "+
Math.floor((d%60000)/1000)+"S";

},1000);

/* FLOWERS */

function startFlowers(){
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),7000);
},400);
}

/* SPARKLES */

function startSparkles(){
setInterval(()=>{
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
},200);
}

</script>

</body>
</html>
